<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Controller body -->
  <rect x="2" y="7" width="20" height="12" rx="5" ry="5" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
  <!-- D-pad left/right -->
  <line x1="6" y1="13" x2="10" y2="13"/>
  <!-- D-pad up/down -->
  <line x1="8" y1="11" x2="8" y2="15"/>
  <!-- Buttons -->
  <circle cx="15" cy="11" r="1" fill="white" stroke="none"/>
  <circle cx="17" cy="13" r="1" fill="white" stroke="none"/>
  <circle cx="15" cy="15" r="1" fill="white" stroke="none"/>
  <circle cx="13" cy="13" r="1" fill="white" stroke="none"/>
  <!-- Joystick bumps -->
  <circle cx="7" cy="5" r="2" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.5"/>
  <circle cx="17" cy="5" r="2" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.5"/>
</svg>